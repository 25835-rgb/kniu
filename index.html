<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h3 class="text-center mb-4 text-primary">ลงทะเบียนข้อมูลนักเรียน</h3>
        <form id="studentForm">
            
            <div class="mb-3">
                <label for="prefix" class="form-label">คำนำหน้าชื่อ</label>
                <select class="form-select" id="prefix" required>
                    <option value="" selected disabled>เลือกคำนำหน้าชื่อ</option>
                    <option value="เด็กชาย">เด็กชาย</option>
                    <option value="เด็กหญิง">เด็กหญิง</option>
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                </select>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="firstName" class="form-label">ชื่อ</label>
                    <input type="text" class="form-control" id="firstName" placeholder="ชื่อจริง" required>
                </div>
                <div class="col-md-6">
                    <label for="lastName" class="form-label">นามสกุล</label>
                    <input type="text" class="form-control" id="lastName" placeholder="นามสกุล" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="grade" class="form-label">ชั้นมัธยมศึกษาปีที่</label>
                    <select class="form-select" id="grade" required>
                        <option value="" selected disabled>เลือกชั้นปี</option>
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="room" class="form-label">ห้อง</label>
                    <input type="number" class="form-control" id="room" placeholder="เช่น 1" min="1" required>
                </div>
                <div class="col-md-4">
                    <label for="number" class="form-label">เลขที่</label>
                    <input type="number" class="form-control" id="number" placeholder="เช่น 15" min="1" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mt-3">บันทึกข้อมูล</button>
        </form>
    </div>
</div>

<script>
    // กำหนด URL ของ Apps Script ที่คุณให้มา
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw47mux4oQBiv_tjOxl_z2ZNaUKAq3x46CTwPV5zF4z1Or41jLm3ZiRMavgmBVyHHY3Bg/exec";

    // ฟังก์ชัน Callback ที่จะถูกเรียกเมื่อ Apps Script ประมวลผลและส่งข้อมูลกลับมาสำเร็จ (JSONP)
    function handleResponse(response) {
        if (response.result === "success") {
            // แสดงแจ้งเตือนสำเร็จด้วย SweetAlert2
            Swal.fire({
                icon: 'success',
                title: 'บันทึกสำเร็จ!',
                text: 'ข้อมูลของท่านถูกบันทึกลงระบบเรียบร้อยแล้ว',
                confirmButtonText: 'ตกลง'
            });
            document.getElementById('studentForm').reset(); // เคลียร์ฟอร์มหลังบันทึกเสร็จ
        } else {
            // กรณีเกิดข้อผิดพลาดจากฝั่ง Server
            Swal.fire({
                icon: 'error',
                title: 'เกิดข้อผิดพลาด',
                text: response.message || 'ไม่สามารถบันทึกข้อมูลได้',
                confirmButtonText: 'ลองใหม่'
            });
        }
    }

    // ดักจับการกด Submit ฟอร์ม
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ป้องกันฟอร์มรีโหลดหน้าเว็บ

        // แสดง SweetAlert สถานะกำลังโหลด/กำลังบันทึกข้อมูล
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            text: 'กรุณารอสักครู่ ระบบกำลังนำข้อมูลลงฐานข้อมูล',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading(); // แสดงสัญลักษณ์หมุนๆ
            }
        });

        // ดึงค่าจากฟิลด์ต่างๆ ของฟอร์ม
        const prefix = document.getElementById('prefix').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const grade = document.getElementById('grade').value;
        const room = document.getElementById('room').value;
        const number = document.getElementById('number').value;

        // บีบอัดข้อมูลและสร้าง Query Parameters สำหรับส่งแบบ GET ยัดฟังก์ชัน callback เข้าไปด้วย
        const queryParams = new URLSearchParams({
            callback: 'handleResponse', // ชื่อฟังก์ชันด้านบนที่จะให้รันเมื่อตอบกลับมา
            prefix: prefix,
            firstName: firstName,
            lastName: lastName,
            grade: 'ม.' + grade,
            room: room,
            number: number
        });

        // สร้างแท็ก <script> ชั่วคราวเพื่อใช้ยิงข้ามโดเมน (JSONP Technique)
        const script = document.createElement('script');
        script.src = `${APPS_SCRIPT_URL}?${queryParams.toString()}`;
        
        // ดักจับกรณีแท็กโหลดไม่สำเร็จ (เช่น เน็ตหลุด หรือ URL ผิด)
        script.onerror = function() {
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว',
                text: 'ไม่สามารถติดต่อกับเซิร์ฟเวอร์ได้ กรุณาตรวจสอบอินเทอร์เน็ต',
                confirmButtonText: 'ตกลง'
            });
        };

        // สั่งทำงานโดยการยัดแท็ก script เข้าไปใน body (หลังจากรันเสร็จ มันจะลบตัวเองเพื่อความสะอาด)
        document.body.appendChild(script);
        document.body.removeChild(script); 
    });
</script>

</body>
</html>
